<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Cart</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body{
      background: linear-gradient(to right,#f8f9fa,#eef2f7);
      font-family: Arial;
    }

    .cart-box{
      max-width: 700px;
      margin: 60px auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
    }

    .item{
      padding: 15px;
      border-radius: 12px;
      background: #f8f9fa;
      margin-bottom: 15px;
    }

    .price{
      color: #2563eb;
      font-weight: bold;
    }

    .btn-dark{
      border-radius: 10px;
      padding: 10px 25px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="cart-box shadow">

      <h1 class="text-center mb-4">Your Cart</h1>

      <div class="item d-flex justify-content-between">
        <span>Smart Watch</span>
        <span class="price">$99</span>
      </div>

      <div class="item d-flex justify-content-between">
        <span>Wireless Headphones</span>
        <span class="price">$149</span>
      </div>

      <div class="item d-flex justify-content-between">
        <span>Smartphone</span>
        <span class="price">$499</span>
      </div>

      <h4 class="text-end mt-4">
        Total: <span class="price">$747</span>
      </h4>

      <div class="text-center mt-4">
        <a href="catalog.html" class="btn btn-dark">
          Back to Catalog
        </a>
      </div>

    </div>

  </div>

</body>
</html>
